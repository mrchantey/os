# Change the default Omarchy look'n'feel
# Shared across all devices (per-device monitor/scale lives in monitors-device.conf).

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
  gaps_in = 0
  gaps_out = 0
  layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
  rounding = 0
  # careful! you might make this window disapper
  active_opacity = 1.0
  inactive_opacity = 1.0
  fullscreen_opacity = 1.0
  blur {
    enabled = false
  }
}

# Master-layout orientation is device-specific (centered column on the ultrawide,
# full-screen on the laptop) and lives in the per-device hypr-<device>/layout-device.conf,
# sourced after this file. See ~/me/os/CLAUDE.md.

animations {
  #enabled = no
}
