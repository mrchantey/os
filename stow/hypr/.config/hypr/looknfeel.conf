# Change the default Omarchy look'n'feel
# Shared across all devices (per-device monitor/scale lives in monitors.conf).

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
  gaps_in = 0
  gaps_out = 0
  layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
  rounding = 0
  # careful! you might make this window disapper
  active_opacity = 1.0
  inactive_opacity = 1.0
  fullscreen_opacity = 1.0
  blur {
    enabled = false
  }
}

# https://wiki.hypr.land/Configuring/Master-Layout/
master {
  new_status = slave
  slave_count_for_center_master = 0
  orientation = center
  mfact = 0.5
}

animations {
  #enabled = no
}
