# Tile apps that omarchy forces to float but should behave as regular windows.
# These rules are loaded after omarchy defaults so they take precedence.

# Steam - full application, should tile
windowrule = tile on, match:class steam

# PDF viewer
windowrule = tile on, match:class org.gnome.Evince

# Image viewer
windowrule = tile on, match:class imv

# Video player
windowrule = tile on, match:class mpv

# Calculator
windowrule = tile on, match:class org.gnome.Calculator

# Password managers (full apps, not the transient extension popups)
windowrule = tile on, match:class ^(1[p|P]assword)$
windowrule = tile on, match:class ^(Bitwarden)$

# LocalSend file sharing
windowrule = tile on, match:class localsend


windowrule = tile on, match:class (org.omarchy.bluetui|org.omarchy.impala|org.omarchy.wiremix|org.omarchy.btop|org.omarchy.terminal|org.omarchy.bash|org.gnome.NautilusPreviewer|org.gnome.Evince|com.gabm.satty|Omarchy|About|TUI.float|imv|mpv)
