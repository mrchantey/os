# Force every window to tile. Omarchy floats a long and growing list of apps
# (image viewer, calculator, file pickers, password managers, PiP, etc) and I
# don't want to chase each edge case. These rules override them all.
#
# Why three rules instead of one catch-all: `float`/`tile` are static effects
# where the last matching rule wins, BUT Hyprland assigns tags before it can
# match on them, so every `match:tag` rule is effectively evaluated after every
# `match:class` rule regardless of file order. Omarchy floats most apps via
# `float on, match:tag floating-window`, which a `match:class .*` rule can never
# beat. So we override on the class (covers steam, calculator, localsend,
# screensaver, the webcam overlay) AND on each tag omarchy floats by.
#
# This file is sourced last in hyprland.conf, so within each match pass our
# rules come after the omarchy defaults and take precedence.
windowrule = tile on, match:class .*
windowrule = tile on, match:tag floating-window
windowrule = tile on, match:tag pip

# Scroll faster in the terminal
windowrule = match:class (Alacritty|kitty), scroll_touchpad 1.5
windowrule = match:class com.mitchellh.ghostty, scroll_touchpad 0.2
