# Tile everything by default, then opt specific windows back into floating.
#
# Background on rule precedence (this is why the opt-ins look the way they do):
# `float`/`tile` are static effects where the LAST matching rule wins. But
# Hyprland assigns tags before it can match on them, so every `match:tag` rule
# is effectively evaluated after every `match:class`/`match:title` rule,
# regardless of file order. Omarchy floats most apps via the `floating-window`
# tag, so a plain `match:class` rule can never beat that. This file is sourced
# last in hyprland.conf, so within each pass our rules win over the defaults.

# ── Default: force every window to tile ──────────────────────────────────────
windowrule = tile on, match:class .*              # beats class/title floats (steam, calculator, localsend, screensaver, webcam overlay)
windowrule = tile on, match:tag floating-window   # beats the tag float (image viewer, mpv, password managers, file pickers)
windowrule = tile on, match:tag pip               # beats picture-in-picture

# ── Opt-ins: windows allowed to float ────────────────────────────────────────
# To let a window float, re-enable `float on` AFTER the tile rules above, in the
# SAME pass omarchy used to float it:
#   * Floated by class (steam, org.gnome.Calculator, localsend, screensaver):
#       windowrule = float on, match:class <class>
#   * Floated by the floating-window tag (file pickers, imv, mpv, 1Password,
#     Bitwarden): you MUST include match:tag floating-window or the tile rule wins:
#       windowrule = float on, match:tag floating-window, match:class <class>
# Centering/sizing come free from omarchy's existing `match:tag floating-window`
# rules, which only take effect once the window is floating again.

# File picker / open-save dialogs:
windowrule = float on, match:tag floating-window, match:title ^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*)

# ── Misc ─────────────────────────────────────────────────────────────────────
# Scroll faster in the terminal
windowrule = match:class (Alacritty|kitty), scroll_touchpad 1.5
windowrule = match:class com.mitchellh.ghostty, scroll_touchpad 0.2
