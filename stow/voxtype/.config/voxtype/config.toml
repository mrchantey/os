# voxtype configuration (full schema reference: /etc/voxtype/config.toml)

# state written for `voxtype status` / waybar; "auto" => $XDG_RUNTIME_DIR/voxtype/state
state_file = "auto"

[hotkey]
# built-in evdev hotkey disabled — recording is driven by Hyprland binds on
# Scroll Lock (see ~/.config/hypr/bindings.conf), so no 'input' group is needed
enabled = false
key = "SCROLLLOCK"
modifiers = []

[audio]
device = "default"
sample_rate = 16000
max_duration_secs = 60

[whisper]
model = "large-v3-turbo"
language = "en"
translate = false
on_demand_loading = false

[output]
mode = "type"
fallback_to_clipboard = true
type_delay_ms = 0
pre_type_delay_ms = 0

[output.notification]
on_recording_start = false
on_recording_stop = false
on_transcription = false

[status]
icon_theme = "emoji"


[text.replacements]
"vox type" = "voxtype"
"oh marky" = "Omarchy"
"beat mash" = "beetmash"
"beatmash" = "beetmash"
"beat draft" = "beet-draft"
"beat cli" = "beet-cli"
"beat core" = "beet_core"
"beat core macros" = "beet_core_macros"
"beat core shared" = "beet_core_shared"
"beat infra" = "beet_infra"
"beat net" = "beet_net"
"beat ui" = "beet_ui"
"beat router" = "beet_router"
"beat thread" = "beet_thread"
"beat action" = "beet_action"
"bait" = "beet"
"beat" = "beet"
"beats" = "beet"
"nisha" = "Nicha"
"anisha" = "Nicha"
"raid" = "read"
