# voxtype configuration (full schema reference: /etc/voxtype/config.toml)

# state written for `voxtype status` / waybar; "auto" => $XDG_RUNTIME_DIR/voxtype/state
state_file = "auto"

[hotkey]
# built-in evdev hotkey disabled — recording is driven by Hyprland binds on
# Scroll Lock (see ~/.config/hypr/bindings.conf), so no 'input' group is needed
enabled = false
key = "SCROLLLOCK"
modifiers = []

[audio]

# Pause MPRIS media players during recording
pause_media = true
device = "default"
sample_rate = 16000
max_duration_secs = 60

[whisper]
model = "large-v3-turbo"
language = "en"
translate = false
on_demand_loading = false
# gpu_isolation is intentionally OFF (the schema default). It spawns a fresh worker
# per clip, which reloads the model (~1.7s) and only opens the mic after — that delay
# swallows short push-to-talk recordings ("No audio was captured"). GPU selection on
# hybrid-graphics laptops is instead pinned by GGML_VK_VISIBLE_DEVICES in the per-device
# drop-in (~/.config/systemd/user/voxtype.service.d/gpu.conf, written by `just
# setup-voxtype-gpu`), which the persistent daemon honors — so isolation isn't needed.

[output]
mode = "type"
fallback_to_clipboard = true
type_delay_ms = 0
pre_type_delay_ms = 0

[output.notification]
on_recording_start = false
on_recording_stop = false
on_transcription = false

[status]
icon_theme = "emoji"


