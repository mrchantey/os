# Disable the keyboard engine's word-completion ("hint") hotkeys. By default they
# grab Control+Alt+H (toggle) and Control+Alt+J (enable for one keystroke)
# globally, swallowing the keys before apps like Zed see them and popping up a
# candidate list while typing. Empty value = no binding.
EnableHintByDefault=False
Hint Trigger=
One Time Hint Trigger=
