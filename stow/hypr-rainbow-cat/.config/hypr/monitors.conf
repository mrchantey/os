# rainbow-cat (desktop) — C49RG9x ultrawide + C24F390 side, workspaces pinned.
# Monitors are matched by description, not port, so replugging cables to
# different DP/HDMI ports (or motherboard vs GPU) does not break the config.
# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors all
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)

# Straight 1x setup for low-resolution displays like 1080p or 1440p
env = GDK_SCALE,1

# ultrawide (centered, scaled 1.25 -> logical 4096x1152)
monitorv2 {
  output = desc:Samsung Electric Company C49RG9x
  mode = 5120x1440@119.97
  position = 0x0
  scale = 1.25
  #scale = 1.333333
  transform = 0
  # additional settings
  #bitdepth = 10
  #cm = hdr
  sdrbrightness = 1.2
  sdrsaturation = 1.0
}

# side monitor (now on the RIGHT of the ultrawide; logical width 4096)
monitorv2 {
  output = desc:Samsung Electric Company C24F390
  mode = 1920x1080@60
  position = 4096x0
  scale = 1
  transform = 0
}

workspace = 1,name:beet,monitor:desc:Samsung Electric Company C49RG9x
workspace = 2,monitor:desc:Samsung Electric Company C49RG9x
workspace = 3,monitor:desc:Samsung Electric Company C49RG9x
workspace = 4,monitor:desc:Samsung Electric Company C49RG9x
workspace = 5,monitor:desc:Samsung Electric Company C49RG9x
workspace = 6,monitor:desc:Samsung Electric Company C49RG9x
workspace = 7,monitor:desc:Samsung Electric Company C24F390,layoutopt:orientation:left
workspace = 8,monitor:desc:Samsung Electric Company C24F390,layoutopt:orientation:left
workspace = 9,monitor:desc:Samsung Electric Company C24F390,layoutopt:orientation:left
workspace = 10,monitor:desc:Samsung Electric Company C24F390,layoutopt:orientation:left
