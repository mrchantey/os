# rainbow-cat (desktop) — left-handed mouse.
# Control your input devices
# See https://wiki.hypr.land/Configuring/Variables/#input
input {
	# follow_mouse = 0
  left_handed = true
  # Use multiple keyboard layouts and switch between them with Left Alt + Right Alt
  # kb_layout = us,dk,eu
  kb_layout = us
  kb_options = compose:caps # ,grp:alts_toggle

  # Change speed of keyboard repeat
  repeat_rate = 40
  repeat_delay = 600

  # Increase sensitity for mouse/trackpack (default: 0)
  # sensitivity = 0.35

  touchpad {
    # Use natural (inverse) scrolling
    # natural_scroll = true

    # Use two-finger clicks for right-click instead of lower-right corner
    # clickfinger_behavior = true

    # Control the speed of your scrolling
    scroll_factor = 0.4
  }
}

# Kensington Orbit trackball: halve pointer movement (400 DPI feels like 200).
# flat profile = constant factor, no acceleration (a velocity-based custom
# curve made the pointer jump on the first move). With flat, the factor is
# 1 + sensitivity, so -0.5 gives exactly half speed.
device {
  name = kensington-orbit-wireless-tb-mouse
  accel_profile = flat
  sensitivity = -0.5
}

cursor {
    hide_on_key_press = true
}

misc {
	focus_on_activate = true
  mouse_move_focuses_monitor = false
}
